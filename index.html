<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pong</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #38bdf8;
            --secondary: #f472b6;
            --text: #f8fafc;
            --accent: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: 90vw;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: var(--accent);
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            z-index: 10;
        }

        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.6;
        }

        .score-value {
            font-size: 3rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .player-score { color: var(--primary); }
        .ai-score { color: var(--secondary); }

        .message-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 20;
        }

        .message-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .message-text {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 1rem;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .message-overlay.active .message-text {
            transform: scale(1);
        }

        .pause-hint {
            font-size: 1rem;
            opacity: 0.7;
            margin-top: 10px;
        }

        .controls-hint {
            position: fixed;
            bottom: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 999px;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .score-value { font-size: 2rem; }
            .message-text { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameContainer">
        <div class="ui-overlay">
            <div class="score-box">
                <span class="score-label">Player</span>
                <span class="score-value player-score" id="playerScore">0</span>
            </div>
            <div class="score-box">
                <span class="score-label">CPU (AI)</span>
                <span class="score-value ai-score" id="aiScore">0</span>
            </div>
        </div>

        <canvas id="pongCanvas"></canvas>

        <div class="message-overlay" id="messageOverlay">
            <div class="message-text" id="messageText">POINT!</div>
            <div class="pause-hint" id="pauseHint">Press Space to Resume</div>
        </div>
    </div>

    <div class="controls-hint">
        <span>Arrows / Mouse / Touch to Move</span>
        <span>•</span>
        <span style="color: #fff">SPACE to Pause</span>
    </div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');
        const playerDisplay = document.getElementById('playerScore');
        const aiDisplay = document.getElementById('aiScore');
        const messageOverlay = document.getElementById('messageOverlay');
        const messageText = document.getElementById('messageText');
        const pauseHint = document.getElementById('pauseHint');

        // Game Configuration
        const config = {
            paddleWidth: 12,
            paddleHeight: 100,
            ballSize: 10,
            initialBallSpeed: 5,
            speedIncrement: 0.2,
            maxBallSpeed: 15,
            aiBaseSpeed: 4.5,
            aiReactionRange: 0.85,
        };

        let gameState = {
            playerScore: 0,
            aiScore: 0,
            isPaused: false,
            isManualPause: false,
            width: 0,
            height: 0
        };

        const ball = {
            x: 0,
            y: 0,
            dx: 0,
            dy: 0,
            speed: config.initialBallSpeed,
            reset() {
                this.x = gameState.width / 2;
                this.y = gameState.height / 2;
                this.speed = config.initialBallSpeed;
                const angle = (Math.random() * Math.PI / 4) - (Math.PI / 8); 
                const direction = Math.random() > 0.5 ? 1 : -1;
                this.dx = direction * this.speed * Math.cos(angle);
                this.dy = this.speed * Math.sin(angle);
            }
        };

        const player = {
            y: 0,
            score: 0
        };

        const ai = {
            y: 0,
            score: 0,
            speed: config.aiBaseSpeed
        };

        function resize() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            gameState.width = canvas.width;
            gameState.height = canvas.height;
            
            player.y = gameState.height / 2 - config.paddleHeight / 2;
            ai.y = gameState.height / 2 - config.paddleHeight / 2;
            ball.reset();
        }

        // Input Handlers
        window.addEventListener('mousemove', (e) => {
            if (gameState.isManualPause) return;
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            player.y = Math.max(0, Math.min(gameState.height - config.paddleHeight, mouseY - config.paddleHeight / 2));
        });

        window.addEventListener('touchmove', (e) => {
            if (gameState.isManualPause) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touchY = e.touches[0].clientY - rect.top;
            player.y = Math.max(0, Math.min(gameState.height - config.paddleHeight, touchY - config.paddleHeight / 2));
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            // Pause Toggle
            if (e.code === 'Space') {
                togglePause();
                return;
            }

            if (gameState.isManualPause) return;

            const step = 30;
            if (e.key === 'ArrowUp') player.y = Math.max(0, player.y - step);
            if (e.key === 'ArrowDown') player.y = Math.min(gameState.height - config.paddleHeight, player.y + step);
        });

        function togglePause() {
            // Don't allow manual unpause if the game is in the middle of a "Point Scored" delay
            if (gameState.isPaused && !gameState.isManualPause) return;

            gameState.isManualPause = !gameState.isManualPause;
            gameState.isPaused = gameState.isManualPause;

            if (gameState.isManualPause) {
                messageText.innerText = "GAME PAUSED";
                messageText.style.color = "#fff";
                pauseHint.style.display = "block";
                messageOverlay.classList.add('active');
            } else {
                messageOverlay.classList.remove('active');
            }
        }

        function showMessage(text, color) {
            messageText.innerText = text;
            messageText.style.color = color;
            pauseHint.style.display = "none";
            messageOverlay.classList.add('active');
            gameState.isPaused = true;
            
            setTimeout(() => {
                // If the user manually paused during this timeout, don't auto-resume
                if (!gameState.isManualPause) {
                    messageOverlay.classList.remove('active');
                    gameState.isPaused = false;
                    ball.reset();
                }
            }, 1500);
        }

        function update() {
            if (gameState.isPaused) return;

            // Move Ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ceiling/Floor bounce
            if (ball.y <= 0 || ball.y + config.ballSize >= gameState.height) {
                ball.dy *= -1;
            }

            // AI Logic
            const aiCenter = ai.y + config.paddleHeight / 2;
            const ballCenter = ball.y + config.ballSize / 2;
            const currentAiSpeed = Math.min(ball.speed * 0.85, 9);
            
            if (aiCenter < ballCenter - 10) {
                ai.y += currentAiSpeed;
            } else if (aiCenter > ballCenter + 10) {
                ai.y -= currentAiSpeed;
            }
            ai.y = Math.max(0, Math.min(gameState.height - config.paddleHeight, ai.y));

            // Collision Detection: Player
            if (ball.dx < 0 && 
                ball.x <= config.paddleWidth + 20 && 
                ball.x >= 20 &&
                ball.y + config.ballSize >= player.y && 
                ball.y <= player.y + config.paddleHeight) {
                
                ball.dx *= -1.1;
                ball.speed = Math.min(ball.speed * 1.1, config.maxBallSpeed);
                const hitPos = (ball.y + config.ballSize/2) - (player.y + config.paddleHeight/2);
                ball.dy = hitPos * 0.15;
            }

            // Collision Detection: AI
            if (ball.dx > 0 && 
                ball.x + config.ballSize >= gameState.width - config.paddleWidth - 20 && 
                ball.x + config.ballSize <= gameState.width - 20 &&
                ball.y + config.ballSize >= ai.y && 
                ball.y <= ai.y + config.paddleHeight) {
                
                ball.dx *= -1.1;
                ball.speed = Math.min(ball.speed * 1.1, config.maxBallSpeed);
                const hitPos = (ball.y + config.ballSize/2) - (ai.y + config.paddleHeight/2);
                ball.dy = hitPos * 0.15;
            }

            // Scoring
            if (ball.x < 0) {
                gameState.aiScore++;
                aiDisplay.innerText = gameState.aiScore;
                showMessage("AI SCORES!", "#f472b6");
            } else if (ball.x > gameState.width) {
                gameState.playerScore++;
                playerDisplay.innerText = gameState.playerScore;
                showMessage("PLAYER SCORES!", "#38bdf8");
            }
        }

        function draw() {
            ctx.clearRect(0, 0, gameState.width, gameState.height);

            // Draw center line
            ctx.setLineDash([10, 15]);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(gameState.width / 2, 0);
            ctx.lineTo(gameState.width / 2, gameState.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw Paddles
            ctx.fillStyle = '#38bdf8';
            drawRoundedRect(ctx, 20, player.y, config.paddleWidth, config.paddleHeight, 6);
            ctx.fillStyle = '#f472b6';
            drawRoundedRect(ctx, gameState.width - config.paddleWidth - 20, ai.y, config.paddleWidth, config.paddleHeight, 6);

            // Draw Ball
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x + config.ballSize/2, ball.y + config.ballSize/2, config.ballSize/2, 0, Math.PI * 2);
            ctx.fill();

            // Glow effect
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
        }

        function drawRoundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.onload = () => {
            resize();
            window.addEventListener('resize', resize);
            gameLoop();
        };
    </script>
</body>
</html>
